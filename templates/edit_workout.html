<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Workout — FTRK</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav>
    <a href="{{ url_for('dashboard') }}" class="fc-logo">
      <span class="fc-logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 9H4.5L6.5 4L9 13L11.5 6L13.5 9H16" stroke="#0D0D0D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      FTRK
    </a>
    <div class="nav-links">
      <a href="{{ url_for('logout') }}" class="nav-danger">Log out</a>
    </div>
  </nav>

  <div class="fc-page">

    <a href="{{ url_for('dashboard') }}" class="fc-back">
      <svg viewBox="0 0 14 14" fill="none"><path d="M10 7H4M6 4L2 7L6 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Dashboard
    </a>

    <div class="page-header">
      <h1>Edit Workout</h1>
      <p>Update the details for this session.</p>
    </div>

    <div class="card" style="max-width:560px;">
      <form method="POST">

        <div class="form-group">
          <label class="form-label" for="exercise">Exercise</label>
          <input class="form-input" type="text" id="exercise" name="exercise" value="{{ workout['exercise'] }}" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="sets">Sets</label>
            <input class="form-input" type="number" id="sets" name="sets" value="{{ workout['sets'] }}" min="1" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="reps">Reps</label>
            <input class="form-input" type="number" id="reps" name="reps" value="{{ workout['reps'] }}" min="1" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="weight">Weight (lbs)</label>
            <input class="form-input" type="number" step="0.1" id="weight" name="weight" value="{{ workout['weight'] }}" min="0" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="date">Date</label>
          <input class="form-input" type="date" id="date" name="date" value="{{ workout['date'] }}" required />
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-top:8px;">
          <button type="submit" class="btn btn-primary">Update Workout</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
